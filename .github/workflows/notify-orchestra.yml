name: Notify Orchestra

on:
  push:
    branches: [main]

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch Orchestra DocArchitect sync
        env:
          TOKEN: ${{ secrets.ORCHESTRA_REPO_DISPATCH_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "ORCHESTRA_REPO_DISPATCH_TOKEN is not configured; skipping repository_dispatch."
            exit 0
          fi

          curl -fsSL \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/vinoth2vinoth/orchestra-multi-agent-ai-framework/dispatches \
            -d '{"event_type":"docarchitect-updated"}'
